name: MuscleMap
options:
  bundleIdPrefix: com.murakamitomoki
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""

targets:
  MuscleMap:
    type: application
    platform: iOS
    sources:
      - path: Sources/MuscleMap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.murakamitomoki.musclemap
        INFOPLIST_FILE: Sources/MuscleMap/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/MuscleMap/Resources/MuscleMap.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/MuscleMap/Resources/MuscleMap.entitlements
    info:
      path: Sources/MuscleMap/Resources/Info.plist
      properties:
        CFBundleDisplayName: MuscleMap
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - sdk: SceneKit.framework
      - sdk: CloudKit.framework
